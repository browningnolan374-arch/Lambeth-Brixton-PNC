<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Lambeth PNC Login</title>

<style>
body { margin:0; font-family:Arial; background:#121212; color:#eee; }
header { background:#0b3d91; padding:15px; text-align:center; font-size:24px; }
.container { max-width:400px; margin:40px auto; background:#1e1e1e; padding:20px; border-radius:6px; }

input {
  width:100%;
  padding:8px;
  margin:5px 0;
  background:#2b2b2b;
  border:none;
  color:white;
}

button {
  width:100%;
  padding:10px;
  background:#0b3d91;
  border:none;
  color:white;
  cursor:pointer;
}

.error { color:red; text-align:center; }
</style>
</head>

<body>

<header>Lambeth PNC Login</header>

<div class="container">
<h3>MET Login</h3>
<input id="metUser" placeholder="Username">
<input id="metPass" type="password" placeholder="Password">
<input id="metCollar" placeholder="Collar Number">
<button onclick="loginMET()">Login</button>

<hr>

<h3>Civilian Login</h3>
<input id="civUser" placeholder="Username">
<input id="civPass" type="password" placeholder="Password">
<button onclick="loginCivil()">Login</button>

<p id="error" class="error"></p>
</div>

<script>
const API = "/api/storage";

async function getUsers(){
  const res = await fetch(API + "?key=users");
  const data = await res.json();
  return data.value || {};
}

async function loginMET(){
  const u = metUser.value.trim();
  const p = metPass.value;
  const c = metCollar.value.trim();

  const users = await getUsers();

  if(!users[u] || users[u].password !== p || users[u].type !== "MET" || users[u].collar !== c){
    error.innerText = "Invalid MET login";
    return;
  }

  localStorage.setItem("currentUser", JSON.stringify({username:u,type:"MET"}));
  window.location.href = "dashboard.html";
}

async function loginCivil(){
  const u = civUser.value.trim();
  const p = civPass.value;

  const users = await getUsers();

  if(!users[u] || users[u].password !== p || users[u].type !== "Civilian"){
    error.innerText = "Invalid Civilian login";
    return;
  }

  localStorage.setItem("currentUser", JSON.stringify({username:u,type:"Civilian"}));
  window.location.href = "dashboard.html";
}
</script>

</body>
</html>
