<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Lambeth PNC Login</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#121212;
  color:#eee;
}

header {
  background:#0b3d91;
  padding:15px;
  text-align:center;
  font-size:26px;
  font-weight:bold;
}

.container {
  max-width:400px;
  margin:40px auto;
  background:#1e1e1e;
  padding:20px;
  border-radius:6px;
}

input, select {
  width:100%;
  padding:10px;
  margin:8px 0;
  background:#2b2b2b;
  border:none;
  color:white;
  border-radius:4px;
}

button {
  width:100%;
  padding:10px;
  background:#0b3d91;
  color:white;
  border:none;
  border-radius:4px;
  cursor:pointer;
}

.tabs {
  display:flex;
}

.tabs button {
  flex:1;
  background:#1a4dab;
}

.tabs button.active {
  background:#3a6fc0;
}

.error { color:red; text-align:center; }
.success { color:green; text-align:center; }
</style>
</head>

<body>

<header>Lambeth PNC</header>

<div class="container">

<div class="tabs">
  <button id="loginTab" class="active" onclick="showLogin()">Login</button>
  <button id="registerTab" onclick="showRegister()">Register</button>
</div>

<!-- LOGIN -->
<div id="loginBox">
  <input id="loginUser" placeholder="Username">
  <input id="loginPass" type="password" placeholder="Password">
  <input id="loginCollar" placeholder="Collar Number (MET only)">
  <button onclick="login()">Login</button>
  <p id="loginError" class="error"></p>
</div>

<!-- REGISTER -->
<div id="registerBox" style="display:none;">
  <select id="regType">
    <option value="Civilian">Civilian</option>
    <option value="MET">MET</option>
  </select>

  <input id="regUser" placeholder="Username">
  <input id="regPass" type="password" placeholder="Password">
  <input id="regCollar" placeholder="Collar Number (MET only)">
  <button onclick="register()">Create Account</button>
  <p id="regMsg"></p>
</div>

</div>

<script>
const API = "/api/storage";

//////////////////////////////////////////////////
// STORAGE
//////////////////////////////////////////////////

async function getUsers(){
  const res = await fetch(API + "?key=users");
  const data = await res.json();
  return data.value || {};
}

async function saveUsers(users){
  await fetch(API,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({key:"users", value:users})
  });
}

//////////////////////////////////////////////////
// TABS
//////////////////////////////////////////////////

function showLogin(){
  loginBox.style.display = "block";
  registerBox.style.display = "none";
}

function showRegister(){
  loginBox.style.display = "none";
  registerBox.style.display = "block";
}

//////////////////////////////////////////////////
// REGISTER
//////////////////////////////////////////////////

async function register(){
  const users = await getUsers();

  const u = regUser.value.trim();
  const p = regPass.value;
  const type = regType.value;
  const c = regCollar.value.trim();

  if(!u || !p){
    regMsg.innerText = "Fill all fields";
    return;
  }

  if(users[u]){
    regMsg.innerText = "Username exists";
    return;
  }

  if(type === "MET" && !c){
    regMsg.innerText = "Enter collar number";
    return;
  }

  users[u] = {
    password: p,
    type: type,
    collar: type === "MET" ? c : ""
  };

  await saveUsers(users);

  regMsg.innerText = "Account created ✅";
}

//////////////////////////////////////////////////
// LOGIN
//////////////////////////////////////////////////

async function login(){
  const users = await getUsers();

  const u = loginUser.value.trim();
  const p = loginPass.value;
  const c = loginCollar.value.trim();

  loginError.innerText = "";

  if(!users[u]){
    loginError.innerText = "User not found";
    return;
  }

  const user = users[u];

  if(user.password !== p){
    loginError.innerText = "Wrong password";
    return;
  }

  if(user.type === "MET" && user.collar !== c){
    loginError.innerText = "Invalid collar number";
    return;
  }

  // SAVE SESSION
  localStorage.setItem("currentUser", JSON.stringify({
    username: u,
    type: user.type
  }));

  // GO TO SINGLE DASHBOARD
  window.location.href = "dashboard.html";
}
</script>

</body>
</html>
