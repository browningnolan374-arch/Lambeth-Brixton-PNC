<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lambeth PNC Login</title>
<style>
body { font-family: Arial,sans-serif; background:#121212; color:#eee; margin:0; padding:0; text-align:center; }
h2 { margin-top:20px; }
input, button { padding:8px; margin:5px; border-radius:3px; border:none; }
button { background:#0b3d91; color:white; cursor:pointer; }
.error { color:red; }
</style>
</head>
<body>
<h2>Lambeth PNC Login</h2>

<div>
  <button onclick="showLoginForm('MET')" id="metTab" style="background:#0b3d91;">MET Login</button>
  <button onclick="showLoginForm('Civilian')" id="civilTab" style="background:#1a1a1a;">Civilian Login</button>
</div>

<div id="loginMETForm">
  <input id="loginMETUsername" placeholder="Username"><br>
  <input id="loginMETPassword" type="password" placeholder="Password"><br>
  <input id="loginCollar" placeholder="Collar Number"><br>
  <button onclick="loginMET()">Login</button>
  <p class="error" id="loginMETError"></p>
</div>

<div id="loginCivilForm" style="display:none;">
  <input id="loginCivilUsername" placeholder="Username"><br>
  <input id="loginCivilPassword" type="password" placeholder="Password"><br>
  <button onclick="loginCivil()">Login</button>
  <p class="error" id="loginCivilError"></p>
</div>

<h3>Register</h3>
<button onclick="showRegMET()">Register as MET</button>
<button onclick="showRegCivil()">Register as Civilian</button>
<p class="error" id="regError"></p>

<script>
// KV helpers
async function getDataFromKV(key){
  const res = await fetch(`/api/storage?key=${key}`);
  const data = await res.json();
  return data.value || {};
}
async function saveDataToKV(key,value){
  await fetch('/api/storage',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({key,value})
  });
}

// Login form toggle
function showLoginForm(role){
  if(role==='MET'){ document.getElementById('loginMETForm').style.display='block'; document.getElementById('loginCivilForm').style.display='none'; }
  else{ document.getElementById('loginMETForm').style.display='none'; document.getElementById('loginCivilForm').style.display='block'; }
}

// Login functions
async function loginMET(){
  const u = document.getElementById('loginMETUsername').value.trim();
  const p = document.getElementById('loginMETPassword').value;
  const c = document.getElementById('loginCollar').value.trim();
  const users = await getDataFromKV('users');
  const err = document.getElementById('loginMETError');

  if(users[u] && users[u].password===p && users[u].type==='MET'){
    if(users[u].collar!==c){ err.innerText='Invalid collar number'; return; }
    sessionStorage.setItem('currentUser',JSON.stringify({username:u,type:'MET'}));
    window.location.href = 'dashboard.html';
  } else { err.innerText='Invalid credentials'; }
}

async function loginCivil(){
  const u = document.getElementById('loginCivilUsername').value.trim();
  const p = document.getElementById('loginCivilPassword').value;
  const users = await getDataFromKV('users');
  const err = document.getElementById('loginCivilError');

  if(users[u] && users[u].password===p && users[u].type==='Civilian'){
    sessionStorage.setItem('currentUser',JSON.stringify({username:u,type:'Civilian'}));
    window.location.href = 'dashboard.html';
  } else { err.innerText='Invalid credentials'; }
}

// Registration
async function showRegMET(){ register('MET'); }
async function showRegCivil(){ register('Civilian'); }

async function register(type){
  const u = prompt("Username:");
  const p = prompt("Password:");
  let c='';
  if(type==='MET'){ c = prompt("Collar Number:"); if(!c){ alert('Collar required'); return; } }
  const users = await getDataFromKV('users');
  if(!u||!p){ alert('All fields required'); return; }
  if(users[u]){ alert('Username exists'); return; }
  users[u] = { password:p, type:type, collar:c, reports:[], vehicles:[], people:[], OCs:[] };
  await saveDataToKV('users', users);
  alert(type+' account created! Login now.');
}
</script>
</body>
</html>
