<main id="loginPage">
  <h2 style="text-align:center;">Lambeth PNC Login</h2>
  <div style="display:flex; justify-content:center; gap:50px; flex-wrap:wrap; margin-top:20px;">
    
    <!-- MET Login Box -->
    <div style="background:#1e1e1e; padding:20px; border-radius:8px; width:250px;">
      <h3 style="text-align:center; color:#0b3d91;">MET Login</h3>
      <input type="text" id="loginMETUsername" placeholder="Username"><br>
      <input type="password" id="loginMETPassword" placeholder="Password"><br>
      <input type="text" id="loginCollar" placeholder="Collar Number"><br>
      <button class="addBtn" onclick="loginMET()">Login</button>
      <p class="error" id="loginMETError"></p>
    </div>
    
    <!-- Civilian Login Box -->
    <div style="background:#1e1e1e; padding:20px; border-radius:8px; width:250px;">
      <h3 style="text-align:center; color:#0b3d91;">Civilian Login</h3>
      <input type="text" id="loginCivilUsername" placeholder="Username"><br>
      <input type="password" id="loginCivilPassword" placeholder="Password"><br>
      <button class="addBtn" onclick="loginCivil()">Login</button>
      <p class="error" id="loginCivilError"></p>
    </div>
    
  </div>

  <div style="text-align:center; margin-top:15px;">
    <button onclick="showRegister()">Register</button>
  </div>
</main>
