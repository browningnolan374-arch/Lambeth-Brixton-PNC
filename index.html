<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lambeth PNC</title>
<style>
body {font-family:Arial,sans-serif;background:#121212;color:#eee;margin:0;padding:0;}
header {background:#0b3d91;color:white;padding:15px;text-align:center;font-size:24px;font-weight:bold;border-bottom:2px solid #0055a5;}
main { padding:20px; max-width:1000px; margin:auto; }
.section { display:none; }
input, textarea, select { padding:5px;margin-top:5px;width:90%;border-radius:3px;border:none;background:#2b2b2b;color:#eee; }
button {background:#0b3d91;color:white;border:none;padding:5px 10px;margin-top:5px;border-radius:3px;cursor:pointer;}
button:hover { background:#3a6fc0; }
#error {color:red;margin-top:5px;}
#logoutBtn { position:fixed; bottom:20px; right:20px; background:#f44336; padding:10px 15px; border:none; color:white; border-radius:4px; cursor:pointer; font-weight:bold; }
.panel { background:#1e1e1e;padding:10px;border-radius:4px;margin-bottom:15px; }
</style>
</head>
<body>

<header>Lambeth PNC</header>

<!-- LOGIN SCREENS -->
<main id="loginMETPage">
<h2>MET Login</h2>
<input id="metUsername" placeholder="Username"><br><br>
<input id="metPassword" placeholder="Password" type="password"><br><br>
<input id="metCollar" placeholder="Collar Number"><br><br>
<button onclick="loginMET()">Login</button>
<button onclick="showCivilianLogin()">Switch to Civilian Login</button>
<p id="metLoginError"></p>
</main>

<main id="loginCivilPage" class="section">
<h2>Civilian Login</h2>
<input id="civilUsername" placeholder="Username"><br><br>
<input id="civilPassword" placeholder="Password" type="password"><br><br>
<button onclick="loginCivil()">Login</button>
<button onclick="showMETLogin()">Switch to MET Login</button>
<p id="civilLoginError"></p>
</main>

<!-- REGISTRATION SCREENS -->
<main id="registerMETPage" class="section">
<h2>MET Registration</h2>
<input id="regMETUsername" placeholder="Username"><br><br>
<input id="regMETPassword" placeholder="Password" type="password"><br><br>
<input id="regMETCollar" placeholder="Collar Number"><br><br>
<button onclick="registerMET()">Register MET</button>
<button onclick="showMETLogin()">Back to Login</button>
<p id="regMETError"></p>
</main>

<main id="registerCivilPage" class="section">
<h2>Civilian Registration</h2>
<input id="regCivilUsername" placeholder="Username"><br><br>
<input id="regCivilPassword" placeholder="Password" type="password"><br><br>
<button onclick="registerCivil()">Register Civilian</button>
<button onclick="showCivilianLogin()">Back to Login</button>
<p id="regCivilError"></p>
</main>

<!-- DASHBOARD VIEW -->
<main id="dashboardView" class="section">
<h2>OC Records (View Only)</h2>
<label>Select OC: <select id="ocSelectView" onchange="loadOCDataView()"></select></label><br><br>
<div id="ocInfoView" class="panel"></div>
<button onclick="showCreateOCForm()">Create OC</button>
<button onclick="showCallForm()">Make Call</button>
</main>

<!-- DASHBOARD EDIT (MET) -->
<main id="dashboardEdit" class="section">
<h2>OC Records (Edit)</h2>
<label>Select OC: <select id="ocSelectEdit" onchange="loadOCDataEdit()"></select></label><br><br>
<div id="ocInfoEdit" class="panel"></div>
<button onclick="showCallsDashboard()">View Calls</button>
</main>

<!-- CREATE OC FORM (CIV ONLY) -->
<main id="createOCFormPage" class="section">
<h2>Create OC</h2>
<label>RP Name:<br><input id="newOCName"></label><br><br>
<label>RP Birthday:<br><input type="date" id="newOCBirthday"></label><br><br>
<label>RP Address:<br><input id="newOCAddress"></label><br><br>
<label>Gender:<br><input id="newOCGender"></label><br><br>
<label>Ethnicity:<br><input id="newOCEthnicity"></label><br><br>
<label>Distinguishing Marks:<br><input id="newOCDistMarks"></label><br><br>
<button onclick="submitNewOC()">Create OC</button>
<button onclick="cancelNewOC()">Cancel</button>
<p id="newOCError"></p>
</main>

<!-- CALL FORM (CIV) -->
<main id="civCallPage" class="section">
<h2>Submit a Call</h2>
<label>Caller Name:<br><input id="callName"></label><br><br>
<label>Incident Type:<br><input id="callType"></label><br><br>
<label>Location:<br><input id="callLocation"></label><br><br>
<label>Description:<br><textarea id="callDesc"></textarea></label><br><br>
<button onclick="submitCall()">Submit Call</button>
<button onclick="cancelCallForm()">Cancel</button>
<p id="callError"></p>
</main>

<!-- MET CALL DASHBOARD -->
<main id="metCallDashboard" class="section">
<h2>Incoming Calls</h2>
<div id="callsList" class="panel"></div>
</main>

<button id="logoutBtn" onclick="logout()">Logout</button>

<script>
// ===== STORAGE =====
let currentUser = JSON.parse(localStorage.getItem('currentUser')) || null;
function getUsers(){ return JSON.parse(localStorage.getItem('users'))||{} }
function saveUsers(u){ localStorage.setItem('users', JSON.stringify(u)) }
function hideAll(){ ['loginMETPage','loginCivilPage','registerMETPage','registerCivilPage','dashboardView','dashboardEdit','createOCFormPage','civCallPage','metCallDashboard'].forEach(id=>document.getElementById(id).style.display='none'); }
function clearErrors(){ ['metLoginError','civilLoginError','regMETError','regCivilError','newOCError','callError'].forEach(id=>document.getElementById(id).innerText=''); }

// ===== PAGE SWITCH =====
function showMETLogin(){ hideAll(); document.getElementById('loginMETPage').style.display='block'; clearErrors(); }
function showCivilianLogin(){ hideAll(); document.getElementById('loginCivilPage').style.display='block'; clearErrors(); }
function showMETRegister(){ hideAll(); document.getElementById('registerMETPage').style.display='block'; clearErrors(); }
function showCivilianRegister(){ hideAll(); document.getElementById('registerCivilPage').style.display='block'; clearErrors(); }

// ===== REGISTER =====
function registerMET(){
  const u=document.getElementById('regMETUsername').value.trim();
  const p=document.getElementById('regMETPassword').value;
  const c=document.getElementById('regMETCollar').value.trim();
  const users=getUsers();
  if(!u||!p||!c){document.getElementById('regMETError').innerText='All fields required'; return;}
  if(users[u]){document.getElementById('regMETError').innerText='Username exists'; return;}
  users[u]={password:p,type:'MET',collar:c,OCs:[]};
  saveUsers(users);
  document.getElementById('regMETError').innerText='Account created! Login now.';
}

function registerCivil(){
  const u=document.getElementById('regCivilUsername').value.trim();
  const p=document.getElementById('regCivilPassword').value;
  const users=getUsers();
  if(!u||!p){document.getElementById('regCivilError').innerText='All fields required'; return;}
  if(users[u]){document.getElementById('regCivilError').innerText='Username exists'; return;}
  users[u]={password:p,type:'Civilian',OCs:[]};
  saveUsers(users);
  document.getElementById('regCivilError').innerText='Account created! Login now.';
}

// ===== LOGIN =====
function loginMET(){
  const u=document.getElementById('metUsername').value.trim();
  const p=document.getElementById('metPassword').value;
  const c=document.getElementById('metCollar').value.trim();
  const users=getUsers();
  if(!users[u] || users[u].password!==p || users[u].type!=='MET'){ document.getElementById('metLoginError').innerText='Invalid username/password'; return; }
  if(users[u].collar!==c){ document.getElementById('metLoginError').innerText='Invalid collar number'; return; }
  currentUser={username:u,type:'MET'}; localStorage.setItem('currentUser',JSON.stringify(currentUser));
  openDashboard();
}

function loginCivil(){
  const u=document.getElementById('civilUsername').value.trim();
  const p=document.getElementById('civilPassword').value;
  const users=getUsers();
  if(!users[u] || users[u].password!==p || users[u].type!=='Civilian'){ document.getElementById('civilLoginError').innerText='Invalid username/password'; return; }
  currentUser={username:u,type:'Civilian'}; localStorage.setItem('currentUser',JSON.stringify(currentUser));
  openDashboard();
}

// ===== DASHBOARD =====
function openDashboard(){
  if(!currentUser){ showMETLogin(); return; }
  hideAll();
  document.getElementById('dashboardView').style.display='block';
  if(currentUser.type==='MET'){ document.getElementById('dashboardEdit').style.display='block'; }
  if(currentUser.type==='Civilian'){ document.getElementById('createOCFormPage').style.display='none'; }
}

// ===== LOGOUT =====
function logout(){ currentUser=null; localStorage.removeItem('currentUser'); hideAll(); showMETLogin(); }

// ===== CREATE OC (CIV) =====
function showCreateOCForm(){ hideAll(); document.getElementById('createOCFormPage').style.display='block'; }
function cancelNewOC(){ document.getElementById('createOCFormPage').style.display='none'; openDashboard(); }
function submitNewOC(){
  const name=document.getElementById('newOCName').value.trim();
  const dob=document.getElementById('newOCBirthday').value.trim();
  const addr=document.getElementById('newOCAddress').value.trim();
  if(!name||!dob||!addr){document.getElementById('newOCError').innerText='Name, Birthday & Address required'; return;}
  let OCs=JSON.parse(localStorage.getItem('OCs')||'{}');
  if(OCs[name]){document.getElementById('newOCError').innerText='OC exists'; return;}
  OCs[name]={personal:{name,dob,address:addr},convictions:{},vehicles:[],reports:[]};
  localStorage.setItem('OCs',JSON.stringify(OCs));
  alert('OC Created!'); cancelNewOC(); loadOCList();
}

// ===== CALL FORM =====
function showCallForm(){ hideAll(); document.getElementById('civCallPage').style.display='block'; }
function cancelCallForm(){ document.getElementById('civCallPage').style.display='none'; openDashboard(); }
function submitCall(){
  const name=document.getElementById('callName').value.trim();
  const type=document.getElementById('callType').value.trim();
  const loc=document.getElementById('callLocation').value.trim();
  const desc=document.getElementById('callDesc').value.trim();
  if(!name||!type||!loc){document.getElementById('callError').innerText='All fields required'; return;}
  let calls=JSON.parse(localStorage.getItem('calls')||'[]');
  calls.push({caller:name,type:type,location:loc,description:desc,status:'Pending',timestamp:new Date().toLocaleString()});
  localStorage.setItem('calls',JSON.stringify(calls));
  alert('Call submitted!'); cancelCallForm();
}

// ===== OC LIST LOAD =====
function loadOCList(){
  let OCs=JSON.parse(localStorage.getItem('OCs')||'{}');
  let selView=document.getElementById('ocSelectView');
  let selEdit=document.getElementById('ocSelectEdit');
  if(selView) selView.innerHTML=''; if(selEdit) selEdit.innerHTML='';
  Object.keys(OCs).forEach(name=>{
    if(selView){let opt=document.createElement('option'); opt.value=name; opt.innerText=name; selView.appendChild(opt);}
    if(selEdit){let opt=document.createElement('option'); opt.value=name; opt.innerText=name; selEdit.appendChild(opt);}
  });
}

</script>

</body>
</html>
