<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Lambeth PNC Login</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#121212;
  color:#eee;
}

header {
  background:#0b3d91;
  padding:15px;
  text-align:center;
  font-size:24px;
  font-weight:bold;
}

.container {
  max-width:400px;
  margin:40px auto;
  background:#1e1e1e;
  padding:20px;
  border-radius:6px;
}

.tabs {
  display:flex;
}

.tabs button {
  flex:1;
  padding:10px;
  border:none;
  cursor:pointer;
  background:#1a4dab;
  color:white;
}

.tabs .active {
  background:#3a6fc0;
}

input {
  width:100%;
  padding:8px;
  margin:5px 0;
  background:#2b2b2b;
  border:none;
  color:white;
}

button.loginBtn {
  width:100%;
  padding:10px;
  background:#0b3d91;
  border:none;
  color:white;
  margin-top:10px;
  cursor:pointer;
}

.error {
  color:red;
  text-align:center;
}
</style>
</head>

<body>

<header>Lambeth PNC Login</header>

<div class="container">

<div class="tabs">
  <button id="metTab" class="active" onclick="switchTab('MET')">MET</button>
  <button id="civTab" onclick="switchTab('Civilian')">Civilian</button>
</div>

<!-- MET LOGIN -->
<div id="metLogin">
<input id="metUser" placeholder="Username">
<input id="metPass" type="password" placeholder="Password">
<input id="metCollar" placeholder="Collar Number">
<button class="loginBtn" onclick="loginMET()">Login</button>
</div>

<!-- CIV LOGIN -->
<div id="civLogin" style="display:none;">
<input id="civUser" placeholder="Username">
<input id="civPass" type="password" placeholder="Password">
<button class="loginBtn" onclick="loginCivil()">Login</button>
</div>

<p id="error" class="error"></p>

</div>

<script>
const API = "/api/storage";

function switchTab(type){
  document.getElementById("metLogin").style.display = type==="MET" ? "block" : "none";
  document.getElementById("civLogin").style.display = type==="Civilian" ? "block" : "none";

  document.getElementById("metTab").classList.toggle("active", type==="MET");
  document.getElementById("civTab").classList.toggle("active", type==="Civilian");
}

async function getUsers(){
  const res = await fetch(API + "?key=users");
  const data = await res.json();
  return data.value || {};
}

//////////////////////////////////////////////////
// MET LOGIN
//////////////////////////////////////////////////

async function loginMET(){
  const u = document.getElementById("metUser").value.trim();
  const p = document.getElementById("metPass").value;
  const c = document.getElementById("metCollar").value.trim();

  const users = await getUsers();

  if(!users[u]){
    showError("User not found");
    return;
  }

  const user = users[u];

  if(user.type !== "MET"){
    showError("Not a MET account");
    return;
  }

  if(user.password !== p){
    showError("Wrong password");
    return;
  }

  if(user.collar !== c){
    showError("Invalid collar number");
    return;
  }

  // ✅ SAVE LOGIN (THIS FIXES EVERYTHING)
  localStorage.setItem("currentUser", JSON.stringify({
    username: u,
    type: "MET"
  }));

  // ✅ REDIRECT
  window.location.href = "dashboard.html";
}

//////////////////////////////////////////////////
// CIV LOGIN
//////////////////////////////////////////////////

async function loginCivil(){
  const u = document.getElementById("civUser").value.trim();
  const p = document.getElementById("civPass").value;

  const users = await getUsers();

  if(!users[u]){
    showError("User not found");
    return;
  }

  const user = users[u];

  if(user.type !== "Civilian"){
    showError("Not a Civilian account");
    return;
  }

  if(user.password !== p){
    showError("Wrong password");
    return;
  }

  // ✅ SAVE LOGIN
  localStorage.setItem("currentUser", JSON.stringify({
    username: u,
    type: "Civilian"
  }));

  // ✅ REDIRECT
  window.location.href = "dashboard.html";
}

function showError(msg){
  document.getElementById("error").innerText = msg;
}
</script>

</body>
</html>
