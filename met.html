<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MET PNC</title>

<style>
body { margin:0; font-family:Arial; background:#121212; color:#eee; }
header { background:#0b3d91; padding:15px; text-align:center; font-size:24px; }
nav { display:flex; justify-content:center; gap:10px; background:#0a2c70; padding:10px; }
button { background:#1a4dab; border:none; padding:8px 15px; color:white; border-radius:4px; cursor:pointer; }
.section { display:none; padding:20px; }
.card { background:#1e1e1e; padding:10px; margin-top:10px; border-left:4px solid #0b3d91; }
</style>
</head>

<body>

<header>MET Police PNC</header>

<nav>
<button onclick="show('lookup')">Lookup</button>
<button onclick="show('vehicles')">Vehicles</button>
<button onclick="show('warrants')">Warrants</button>
<button onclick="logout()">Logout</button>
</nav>

<div id="lookup" class="section">
<input id="searchName" placeholder="Name">
<button onclick="searchPerson()">Search</button>
<div id="personResult"></div>
</div>

<div id="vehicles" class="section">
<input id="searchPlate" placeholder="Plate">
<button onclick="searchVehicle()">Search</button>
<div id="vehicleResult"></div>
</div>

<div id="warrants" class="section">
<h2>Warrants</h2>
<div id="warrantList"></div>

<input id="warrantName" placeholder="Name">
<input id="warrantReason" placeholder="Reason">
<button onclick="createWarrant()">Create</button>
</div>

<script>
const API="/api/storage";

let user = JSON.parse(localStorage.getItem("currentUser"));
if(!user || user.type!=="MET") location.href="index.html";

function show(id){
  document.querySelectorAll(".section").forEach(s=>s.style.display="none");
  document.getElementById(id).style.display="block";
}

function logout(){
  localStorage.removeItem("currentUser");
  location.href="index.html";
}

async function getData(k){
  const r = await fetch(API+"?key="+k);
  const d = await r.json();
  return d.value||[];
}

async function saveData(k,v){
  await fetch(API,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({key:k,value:v})});
}

async function searchPerson(){
  let OCs = await getData("OCs");
  const name = searchName.value.toLowerCase();
  const res = OCs.filter(o=>o.name.toLowerCase().includes(name));

  personResult.innerHTML="";
  res.forEach(o=>{
    personResult.innerHTML+=`
    <div class="card">
    ${o.name}<br>${o.address}
    </div>`;
  });
}

async function searchVehicle(){
  let users = await getData("users");
  let found=null;

  for(const u in users){
    (users[u].vehicles||[]).forEach(v=>{
      if(v.plate===searchPlate.value) found=v;
    });
  }

  vehicleResult.innerHTML = found ?
  `<div class="card">${found.plate} - ${found.reason}</div>` :
  "Not found";
}

async function createWarrant(){
  let w = await getData("warrants");
  w.push({
    name:warrantName.value,
    reason:warrantReason.value,
    officer:user.username
  });
  await saveData("warrants",w);
  loadWarrants();
}

async function loadWarrants(){
  let w = await getData("warrants");
  warrantList.innerHTML="";
  w.forEach((x,i)=>{
    warrantList.innerHTML+=`
    <div class="card">
    ${x.name} - ${x.reason}
    <button onclick="del(${i})">Delete</button>
    </div>`;
  });
}

async function del(i){
  let w = await getData("warrants");
  w.splice(i,1);
  await saveData("warrants",w);
  loadWarrants();
}

loadWarrants();
show("lookup");
</script>

</body>
</html>
