<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lambeth PNC Dashboard</title>
<style>
body {
    margin:0; font-family: Arial, sans-serif; background:#121212; color:#eee;
}
header {
    background:#0b3d91; color:white; padding:15px; text-align:center; font-size:28px; font-weight:bold;
}
.tabs {
    display:flex; justify-content:center; background:#0a2c70;
}
.tabs button {
    flex:1; padding:12px; background:#1a4dab; border:none; color:white; cursor:pointer; font-weight:bold; font-size:16px;
}
.tabs button.active { background:#3a6fc0; }
.container {
    max-width:400px; margin:30px auto; background:#1e1e1e; padding:20px; border-radius:6px; box-shadow:0 2px 5px rgba(0,0,0,0.5);
}
.container h2 { text-align:center; margin-top:0; }
input { width:100%; padding:8px; margin:5px 0; border-radius:3px; border:none; background:#2b2b2b; color:#eee; }
button.submitBtn { width:100%; padding:10px; background:#0b3d91; border:none; color:white; font-weight:bold; cursor:pointer; border-radius:4px; margin-top:10px; }
button.submitBtn:hover { background:#3a6fc0; }
.error { color:red; text-align:center; margin-top:5px; }
.success { color:green; text-align:center; margin-top:5px; }
</style>
</head>
<body>

<header>Lambeth PNC Dashboard</header>

<div class="tabs">
    <button id="tabMET" class="active" onclick="showTab('MET')">MET Login</button>
    <button id="tabCivil" onclick="showTab('Civil')">Civilian Login</button>
</div>

<div id="loginMET" class="container">
    <h2>MET Login</h2>
    <input type="text" id="loginMETUsername" placeholder="Username">
    <input type="password" id="loginMETPassword" placeholder="Password">
    <input type="text" id="loginCollar" placeholder="Collar Number">
    <button class="submitBtn" onclick="loginMET()">Login</button>
    <p class="error" id="loginMETError"></p>
    <p style="text-align:center; margin-top:10px;">No account? <a href="#" onclick="showRegister('MET')">Register MET</a></p>
</div>

<div id="loginCivil" class="container" style="display:none;">
    <h2>Civilian Login</h2>
    <input type="text" id="loginCivilUsername" placeholder="Username">
    <input type="password" id="loginCivilPassword" placeholder="Password">
    <button class="submitBtn" onclick="loginCivil()">Login</button>
    <p class="error" id="loginCivilError"></p>
    <p style="text-align:center; margin-top:10px;">No account? <a href="#" onclick="showRegister('Civil')">Register Civilian</a></p>
</div>

<div id="registerPage" class="container" style="display:none;">
    <h2>Register</h2>
    <input type="text" id="regUsername" placeholder="Username">
    <input type="password" id="regPassword" placeholder="Password">
    <input type="text" id="regCollar" placeholder="Collar Number (MET only)" style="display:none;">
    <button class="submitBtn" onclick="registerUser()">Create Account</button>
    <p class="error" id="regError"></p>
    <p class="success" id="regSuccess"></p>
    <p style="text-align:center; margin-top:10px;"><a href="#" onclick="backToLogin()">Back to Login</a></p>
</div>

<script>
let currentTab = 'MET';

function showTab(tab){
    currentTab = tab;
    document.getElementById('tabMET').classList.remove('active');
    document.getElementById('tabCivil').classList.remove('active');
    document.getElementById('loginMET').style.display = 'none';
    document.getElementById('loginCivil').style.display = 'none';
    if(tab==='MET'){document.getElementById('tabMET').classList.add('active'); document.getElementById('loginMET').style.display='block';}
    else {document.getElementById('tabCivil').classList.add('active'); document.getElementById('loginCivil').style.display='block';}
}

function getUsers(){ return JSON.parse(localStorage.getItem('users')) || {}; }
function saveUsers(users){ localStorage.setItem('users', JSON.stringify(users)); }

function loginMET(){
    const u = document.getElementById('loginMETUsername').value.trim();
    const p = document.getElementById('loginMETPassword').value;
    const c = document.getElementById('loginCollar').value.trim();
    const users = getUsers();
    const err = document.getElementById('loginMETError');
    err.innerText = '';
    if(!users[u]){ err.innerText="Username does not exist"; return; }
    const user = users[u];
    if(user.type!=='MET'){ err.innerText="Not a MET account"; return; }
    if(user.password!==p){ err.innerText="Incorrect password"; return; }
    if(user.collar!==c){ err.innerText="Invalid collar number"; return; }
    localStorage.setItem('currentUser', JSON.stringify({username:u,type:'MET'}));
    alert('Logged in as MET!'); // replace with dashboard later
}

function loginCivil(){
    const u = document.getElementById('loginCivilUsername').value.trim();
    const p = document.getElementById('loginCivilPassword').value;
    const users = getUsers();
    const err = document.getElementById('loginCivilError');
    err.innerText = '';
    if(!users[u]){ err.innerText="Username does not exist"; return; }
    const user = users[u];
    if(user.type!=='Civil'){ err.innerText="Not a Civilian account"; return; }
    if(user.password!==p){ err.innerText="Incorrect password"; return; }
    localStorage.setItem('currentUser', JSON.stringify({username:u,type:'Civil'}));
    alert('Logged in as Civilian!'); // replace with dashboard later
}

let registerType = 'MET';
function showRegister(type){ registerType=type; document.getElementById('registerPage').style.display='block'; document.getElementById('loginMET').style.display='none'; document.getElementById('loginCivil').style.display='none'; document.getElementById('regCollar').style.display=(type==='MET')?'block':'none'; }

function backToLogin(){ document.getElementById('registerPage').style.display='none'; showTab(registerType); document.getElementById('regError').innerText=''; document.getElementById('regSuccess').innerText=''; }

function registerUser(){
    const u=document.getElementById('regUsername').value.trim();
    const p=document.getElementById('regPassword').value;
    const c=document.getElementById('regCollar').value.trim();
    const users=getUsers();
    const err = document.getElementById('regError');
    const success = document.getElementById('regSuccess');
    err.innerText=''; success.innerText='';
    if(!u||!p){ err.innerText='Enter username & password'; return; }
    if(users[u]){ err.innerText='Username exists'; return; }
    if(registerType==='MET' && !c){ err.innerText='Enter collar number'; return; }
    users[u]={ password:p, type:(registerType==='MET')?'MET':'Civil', collar:(registerType==='MET')?c:'' };
    saveUsers(users);
    success.innerText='Account created! You can login now.';
    document.getElementById('regUsername').value='';
    document.getElementById('regPassword').value='';
    document.getElementById('regCollar').value='';
}
</script>

</body>
</html>
