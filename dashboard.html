<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Lambeth PNC</title>

<style>
body { margin:0; font-family:Arial; background:#121212; color:#eee; }

header {
  background:#0b3d91;
  padding:15px;
  text-align:center;
  font-size:24px;
  font-weight:bold;
}

/* NAV */
nav {
  display:flex;
  justify-content:center;
  gap:10px;
  background:#0a2c70;
  padding:10px;
}

nav button {
  background:#1a4dab;
  border:none;
  padding:8px 15px;
  color:white;
  cursor:pointer;
  border-radius:4px;
}

/* SECTIONS */
.section { display:none; padding:20px; }

.panel {
  background:#1e1e1e;
  padding:15px;
  margin-top:10px;
  border-left:4px solid #0b3d91;
}

input {
  padding:8px;
  margin:5px;
  background:#2b2b2b;
  border:none;
  color:white;
}

button {
  padding:8px 12px;
  background:#0b3d91;
  border:none;
  color:white;
  cursor:pointer;
}

.card {
  background:#1e1e1e;
  padding:10px;
  margin-top:10px;
  border-left:4px solid #0b3d91;
}
</style>
</head>

<body>

<header>Lambeth PNC</header>

<!-- MET NAV -->
<nav id="metNav">
<button onclick="showSection('lookup')">Lookup</button>
<button onclick="showSection('vehiclesMet')">Vehicles</button>
<button onclick="showSection('warrants')">Warrants</button>
<button onclick="logout()">Logout</button>
</nav>

<!-- ================= MET ================= -->

<div id="lookup" class="section">
<h2>Person Lookup</h2>
<input id="searchName" placeholder="Name">
<button onclick="searchPerson()">Search</button>
<div id="personResult"></div>
</div>

<div id="vehiclesMet" class="section">
<h2>Vehicle Lookup</h2>
<input id="searchPlate" placeholder="Plate">
<button onclick="searchVehicle()">Search</button>
<div id="vehicleResult"></div>
</div>

<div id="warrants" class="section">
<h2>Warrants</h2>
<div id="warrantList"></div>

<input id="warrantName" placeholder="Name">
<input id="warrantReason" placeholder="Reason">
<button onclick="createWarrant()">Create</button>
</div>

<!-- ================= CIV ================= -->

<div id="civilianUI" style="display:none;">

<nav>
  <button onclick="showSection('personal')">Personal</button>
  <button onclick="showSection('reports')">Reports</button>
  <button onclick="showSection('vehicles')">Vehicles</button>
  <button onclick="logout()">Logout</button>
</nav>

<div class="panel">
  <select id="ocSelect" onchange="loadOCData()"></select>
  <button onclick="createOC()">Add OC</button>
</div>

<div id="personal" class="section">
<h2>Personal Info</h2>
<input id="piName" placeholder="Name"><br>
<input id="piDOB" type="date"><br>
<input id="piAddress" placeholder="Address"><br>
<input id="piGender" placeholder="Gender"><br>
<button onclick="savePersonalInfo()">Save</button>
</div>

<div id="reports" class="section">
<h2>Reports</h2>
<div id="reportsTable"></div>
<input id="reportInput" placeholder="Report">
<button onclick="addReport()">Add</button>
</div>

<div id="vehicles" class="section">
<h2>Vehicles</h2>
<div id="vehiclesTable"></div>
<input id="vehicleColour" placeholder="Colour">
<input id="vehiclePlate" placeholder="Plate">
<input id="vehicleBrand" placeholder="Brand">
<button onclick="addVehicle()">Add</button>
</div>

</div>

<script>
const API = "/api/storage";

let user = JSON.parse(localStorage.getItem("currentUser"));
if(!user) location.href="index.html";

//////////////////////////////////////////////////
// STORAGE
//////////////////////////////////////////////////

async function getData(k){
  const r = await fetch(API+"?key="+k);
  const d = await r.json();
  return d.value||[];
}

async function saveData(k,v){
  await fetch(API,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({key:k,value:v})
  });
}

//////////////////////////////////////////////////
// INIT
//////////////////////////////////////////////////

document.addEventListener("DOMContentLoaded", () => {

  if(user.type === "MET"){
    metNav.style.display = "flex";
    showSection("lookup");
    loadWarrants();
  } else {
    metNav.style.display = "none";
    civilianUI.style.display = "block";
    loadCivil();
    showSection("personal");
  }

});

//////////////////////////////////////////////////
// NAV
//////////////////////////////////////////////////

function showSection(id){
  document.querySelectorAll(".section").forEach(s=>s.style.display="none");
  document.getElementById(id).style.display="block";
}

function logout(){
  localStorage.removeItem("currentUser");
  location.href="index.html";
}

//////////////////////////////////////////////////
// MET SYSTEM
//////////////////////////////////////////////////

async function searchPerson(){
  let OCs = await getData("OCs");
  const name = searchName.value.toLowerCase();

  const found = OCs.filter(o=>o.personal?.name?.toLowerCase().includes(name));

  personResult.innerHTML="";

  found.forEach(o=>{
    personResult.innerHTML+=`
    <div class="card">
    <h3>${o.personal.name}</h3>
    <p>DOB: ${o.personal.dob}</p>
    <p>Address: ${o.personal.address}</p>
    <button onclick="quickWarrant('${o.personal.name}')">Add Warrant</button>
    </div>`;
  });
}

async function searchVehicle(){
  let OCs = await getData("OCs");

  let found=null;

  OCs.forEach(o=>{
    (o.vehicles||[]).forEach(v=>{
      if(v.plate.toLowerCase() === searchPlate.value.toLowerCase()){
        found=v;
      }
    });
  });

  vehicleResult.innerHTML = found ?
  `<div class="card">
    <h3>${found.plate}</h3>
    <p>Colour: ${found.colour}</p>
  </div>` :
  "Not found";
}

async function createWarrant(){
  let w = await getData("warrants");

  if(!warrantName.value || !warrantReason.value){
    alert("Fill all fields");
    return;
  }

  w.push({
    name:warrantName.value,
    reason:warrantReason.value,
    officer:user.username,
    date:new Date().toLocaleString()
  });

  await saveData("warrants",w);

  warrantName.value="";
  warrantReason.value="";

  loadWarrants();
}

async function loadWarrants(){
  let w = await getData("warrants");

  warrantList.innerHTML="";
  w.forEach((x,i)=>{
    warrantList.innerHTML+=`
    <div class="card">
    <h3>${x.name}</h3>
    <p>${x.reason}</p>
    <button onclick="deleteWarrant(${i})">Delete</button>
    </div>`;
  });
}

async function deleteWarrant(i){
  let w = await getData("warrants");
  w.splice(i,1);
  await saveData("warrants",w);
  loadWarrants();
}

function quickWarrant(name){
  warrantName.value = name;
  showSection("warrants");
}

//////////////////////////////////////////////////
// CIV SYSTEM
//////////////////////////////////////////////////

let currentOCIndex = 0;

async function loadCivil(){
  const allOCs = await getData("OCs");
  const mine = allOCs.filter(o => o.createdBy === user.username);

  ocSelect.innerHTML = "";

  mine.forEach((o,i)=>{
    ocSelect.innerHTML += `<option value="${i}">${o.personal?.name || "OC "+(i+1)}</option>`;
  });

  currentOCIndex = 0;
  loadOCData();
}

async function createOC(){
  let allOCs = await getData("OCs");

  allOCs.push({
    createdBy: user.username,
    personal:{name:"",dob:"",address:"",gender:""},
    reports:[],
    vehicles:[]
  });

  await saveData("OCs", allOCs);
  loadCivil();
}

async function loadOCData(){
  const allOCs = await getData("OCs");
  const mine = allOCs.filter(o => o.createdBy === user.username);
  const oc = mine[ocSelect.value];

  if(!oc) return;

  currentOCIndex = ocSelect.value;

  piName.value = oc.personal.name || "";
  piDOB.value = oc.personal.dob || "";
  piAddress.value = oc.personal.address || "";
  piGender.value = oc.personal.gender || "";

  reportsTable.innerHTML = (oc.reports||[]).map((r,i)=>
    `<div class="card">${r} <button onclick="deleteEntry('reports',${i})">X</button></div>`
  ).join("");

  vehiclesTable.innerHTML = (oc.vehicles||[]).map((v,i)=>
    `<div class="card">${v.plate} (${v.colour}) <button onclick="deleteEntry('vehicles',${i})">X</button></div>`
  ).join("");
}

async function savePersonalInfo(){
  let allOCs = await getData("OCs");
  let mine = allOCs.filter(o => o.createdBy === user.username);

  let oc = mine[currentOCIndex];

  oc.personal = {
    name: piName.value,
    dob: piDOB.value,
    address: piAddress.value,
    gender: piGender.value
  };

  await saveData("OCs", allOCs);
  alert("Saved");
  loadCivil();
}

async function addReport(){
  let allOCs = await getData("OCs");
  let mine = allOCs.filter(o => o.createdBy === user.username);
  let oc = mine[currentOCIndex];

  oc.reports.push(reportInput.value);
  reportInput.value="";

  await saveData("OCs", allOCs);
  loadOCData();
}

async function addVehicle(){
  let allOCs = await getData("OCs");
  let mine = allOCs.filter(o => o.createdBy === user.username);
  let oc = mine[currentOCIndex];

  oc.vehicles.push({
    colour: vehicleColour.value,
    plate: vehiclePlate.value,
    brand: vehicleBrand.value
  });

  vehicleColour.value="";
  vehiclePlate.value="";
  vehicleBrand.value="";

  await saveData("OCs", allOCs);
  loadOCData();
}

async function deleteEntry(type,i){
  let allOCs = await getData("OCs");
  let mine = allOCs.filter(o => o.createdBy === user.username);
  let oc = mine[currentOCIndex];

  oc[type].splice(i,1);

  await saveData("OCs", allOCs);
  loadOCData();
}
</script>

</body>
</html>
