<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Lambeth PNC Dashboard</title>

<style>
body { margin:0; font-family:Arial; background:#121212; color:#eee; }

header {
  background:#0b3d91;
  padding:15px;
  text-align:center;
  font-size:24px;
  font-weight:bold;
}

nav {
  display:flex;
  justify-content:center;
  background:#0a2c70;
  padding:10px;
  gap:10px;
}

nav button {
  background:#1a4dab;
  border:none;
  padding:8px 15px;
  color:white;
  cursor:pointer;
  border-radius:4px;
}

.section { display:none; padding:20px; }

h2 {
  background:#0b3d91;
  padding:10px;
  border-radius:4px;
}

input {
  padding:8px;
  margin:5px;
  width:200px;
  background:#2b2b2b;
  border:none;
  color:white;
}

button {
  padding:8px 12px;
  cursor:pointer;
  border:none;
  background:#0b3d91;
  color:white;
  border-radius:4px;
}

button.deleteBtn {
  background:#f44336;
}

.card {
  background:#1e1e1e;
  border-left:4px solid #0b3d91;
  padding:12px;
  margin-top:10px;
  border-radius:6px;
}
</style>
</head>

<body>

<header>Lambeth PNC</header>

<nav>
<button onclick="showSection('lookup')">PNC Lookup</button>
<button onclick="showSection('vehicles')">Vehicle Lookup</button>
<button onclick="showSection('warrants')">Warrants</button>
<button onclick="showSection('oc')">Create OC</button>
<button onclick="logout()">Logout</button>
</nav>

<!-- PERSON LOOKUP -->
<div id="lookup" class="section">
<h2>Person Lookup</h2>
<input id="searchName" placeholder="Enter Name">
<button onclick="searchPerson()">Search</button>
<div id="personResult"></div>
</div>

<!-- VEHICLE -->
<div id="vehicles" class="section">
<h2>Vehicle Lookup</h2>
<input id="searchPlate" placeholder="Enter Plate">
<button onclick="searchVehicle()">Search</button>
<div id="vehicleResult"></div>
</div>

<!-- WARRANTS -->
<div id="warrants" class="section">
<h2>Warrants</h2>

<div id="warrantList"></div>

<h3>Create Warrant</h3>
<input id="warrantName" placeholder="Name">
<input id="warrantReason" placeholder="Reason">
<button onclick="createWarrant()">Create</button>
</div>

<!-- CIV OC -->
<div id="oc" class="section">
<h2>Create OC</h2>
<input id="ocName" placeholder="Name"><br>
<input id="ocBirthday" type="date"><br>
<input id="ocAddress" placeholder="Address"><br>
<input id="ocGender" placeholder="Gender"><br>
<input id="ocMarks" placeholder="Marks"><br>
<button onclick="createOC()">Create</button>
</div>

<script>
const API = "/api/storage";

window.onerror = (msg) => alert("Error: " + msg);

async function getData(key){
  const res = await fetch(API + "?key=" + key);
  const data = await res.json();
  return data.value ?? null;
}

async function saveData(key, value){
  await fetch(API,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({key,value})
  });
}

let currentUser = JSON.parse(localStorage.getItem("currentUser"));

if(!currentUser){
  window.location.href = "index.html";
}

function showSection(id){
  document.querySelectorAll(".section").forEach(s=>s.style.display="none");
  document.getElementById(id).style.display="block";
}

function logout(){
  localStorage.removeItem("currentUser");
  window.location.href = "index.html";
}

//////////////////////////////////////////////////
// PERSON SEARCH
//////////////////////////////////////////////////

async function searchPerson(){
  const name = document.getElementById("searchName").value.toLowerCase();
  let OCs = await getData("OCs");

  if(!Array.isArray(OCs)) OCs = [];

  const box = document.getElementById("personResult");
  box.innerHTML = "";

  const found = OCs.filter(o => o.name.toLowerCase().includes(name));

  if(found.length === 0){
    box.innerHTML = "No record found";
    return;
  }

  found.forEach(o=>{
    box.innerHTML += `
    <div class="card">
      <h3>${o.name}</h3>
      <p>DOB: ${o.birthday}</p>
      <p>Address: ${o.address}</p>
      <p>Marks: ${o.marks}</p>
      ${currentUser.type==="MET" ? `<button onclick="quickWarrant('${o.name}')">Add Warrant</button>` : ""}
    </div>`;
  });
}

//////////////////////////////////////////////////
// VEHICLE SEARCH
//////////////////////////////////////////////////

async function searchVehicle(){
  const plate = document.getElementById("searchPlate").value.toLowerCase();
  let users = await getData("users");

  if(!users) users = {};

  let found = null;

  for(const u in users){
    (users[u].vehicles || []).forEach(v=>{
      if(v.plate.toLowerCase() === plate){
        found = v;
      }
    });
  }

  const box = document.getElementById("vehicleResult");

  if(!found){
    box.innerHTML = "No vehicle found";
    return;
  }

  box.innerHTML = `
  <div class="card">
    <h3>${found.plate}</h3>
    <p>Colour: ${found.colour}</p>
    <p>Reason: ${found.reason}</p>
  </div>`;
}

//////////////////////////////////////////////////
// WARRANT SYSTEM
//////////////////////////////////////////////////

async function createWarrant(){
  const name = document.getElementById("warrantName").value;
  const reason = document.getElementById("warrantReason").value;

  if(!name || !reason){
    alert("Fill in all fields");
    return;
  }

  let warrants = await getData("warrants");

  if(!Array.isArray(warrants)) warrants = [];

  warrants.push({
    name,
    reason,
    officer: currentUser.username,
    date: new Date().toLocaleString()
  });

  await saveData("warrants", warrants);

  alert("Warrant created ✅");
  loadWarrants();
}

function quickWarrant(name){
  document.getElementById("warrantName").value = name;
  showSection("warrants");
}

async function loadWarrants(){
  const list = document.getElementById("warrantList");
  let warrants = await getData("warrants");

  if(!Array.isArray(warrants)) warrants = [];

  list.innerHTML = "";

  warrants.forEach((w, i)=>{
    list.innerHTML += `
    <div class="card">
      <h3>${w.name}</h3>
      <p>Reason: ${w.reason}</p>
      <p>Officer: ${w.officer}</p>
      <p>Date: ${w.date}</p>
      ${currentUser.type==="MET" ? `<button class="deleteBtn" onclick="deleteWarrant(${i})">Delete</button>` : ""}
    </div>`;
  });
}

async function deleteWarrant(index){
  let warrants = await getData("warrants");

  if(!Array.isArray(warrants)) return;

  if(!confirm("Delete this warrant?")) return;

  warrants.splice(index, 1);

  await saveData("warrants", warrants);

  loadWarrants();
}

//////////////////////////////////////////////////
// OC CREATION
//////////////////////////////////////////////////

async function createOC(){
  let OCs = await getData("OCs");

  if(!Array.isArray(OCs)) OCs = [];

  OCs.push({
    name: ocName.value,
    birthday: ocBirthday.value,
    address: ocAddress.value,
    gender: ocGender.value,
    marks: ocMarks.value,
    createdBy: currentUser.username
  });

  await saveData("OCs", OCs);

  alert("OC Created ✅");
}

//////////////////////////////////////////////////
// ROLE CONTROL
//////////////////////////////////////////////////

if(currentUser.type === "Civilian"){
  document.getElementById("lookup").style.display = "none";
  document.getElementById("vehicles").style.display = "none";
  document.getElementById("warrants").style.display = "none";
  showSection("oc");
} else {
  document.getElementById("oc").style.display = "none";
  showSection("lookup");
  loadWarrants();
}
</script>

</body>
</html>
