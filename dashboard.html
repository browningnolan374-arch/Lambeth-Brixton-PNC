<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Lambeth PNC Dashboard</title>

<style>
body { margin:0; font-family:Arial; background:#121212; color:#eee; }
header { background:#0b3d91; padding:15px; text-align:center; font-size:24px; }

nav {
  display:flex;
  justify-content:center;
  background:#0a2c70;
  padding:10px;
  gap:10px;
}

nav button {
  background:#1a4dab;
  border:none;
  padding:8px 15px;
  color:white;
  cursor:pointer;
}

.section { display:none; padding:20px; }

input {
  padding:8px;
  margin:5px;
  background:#2b2b2b;
  border:none;
  color:white;
}
</style>
</head>

<body>

<header>Lambeth PNC</header>

<nav>
<button onclick="showSection('oc')">Create OC</button>
<button onclick="showSection('vehicles')">Vehicles</button>
<button onclick="showSection('people')">People</button>
<button onclick="logout()">Logout</button>
</nav>

<!-- OC -->
<div id="oc" class="section">
<h2>Create OC</h2>
<input id="ocName" placeholder="Name"><br>
<input id="ocBirthday" type="date"><br>
<input id="ocAddress" placeholder="Address"><br>
<input id="ocGender" placeholder="Gender"><br>
<input id="ocMarks" placeholder="Marks"><br>
<button onclick="createOC()">Create</button>
</div>

<!-- VEHICLES -->
<div id="vehicles" class="section">
<h2>Vehicles</h2>
<input id="vPlate" placeholder="Plate">
<input id="vColour" placeholder="Colour">
<input id="vReason" placeholder="Reason">
<button onclick="addVehicle()">Add</button>

<div id="vehicleList"></div>
</div>

<!-- PEOPLE -->
<div id="people" class="section">
<h2>People</h2>
<div id="peopleList"></div>
</div>

<script>
const API = "/api/storage";

let currentUser = JSON.parse(localStorage.getItem("currentUser"));

if(!currentUser){
  window.location.href = "index.html";
}

function showSection(id){
  document.querySelectorAll(".section").forEach(s=>s.style.display="none");
  document.getElementById(id).style.display="block";
}

function logout(){
  localStorage.removeItem("currentUser");
  window.location.href = "index.html";
}

async function getData(key){
  const res = await fetch(API + "?key=" + key);
  const data = await res.json();
  return data.value || {};
}

async function saveData(key,value){
  await fetch(API,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({key,value})
  });
}

//////////////////////////////////////////////////
// OC
//////////////////////////////////////////////////

async function createOC(){
  const OCs = await getData("OCs") || [];

  OCs.push({
    name: ocName.value,
    birthday: ocBirthday.value,
    address: ocAddress.value,
    gender: ocGender.value,
    marks: ocMarks.value,
    createdBy: currentUser.username
  });

  await saveData("OCs", OCs);
  alert("OC created");
}

//////////////////////////////////////////////////
// VEHICLES
//////////////////////////////////////////////////

async function addVehicle(){
  const users = await getData("users");

  if(!users[currentUser.username].vehicles){
    users[currentUser.username].vehicles = [];
  }

  users[currentUser.username].vehicles.push({
    plate: vPlate.value,
    colour: vColour.value,
    reason: vReason.value
  });

  await saveData("users", users);
  loadVehicles();
}

async function loadVehicles(){
  const users = await getData("users");
  const list = vehicleList;
  list.innerHTML = "";

  const vehicles = users[currentUser.username].vehicles || [];

  vehicles.forEach(v=>{
    list.innerHTML += `<p>${v.plate} - ${v.reason}</p>`;
  });
}

//////////////////////////////////////////////////
// PEOPLE (MET sees all OCs)
//////////////////////////////////////////////////

async function loadPeople(){
  const OCs = await getData("OCs");
  const list = peopleList;

  list.innerHTML = "";

  OCs.forEach(o=>{
    list.innerHTML += `<p>${o.name} - ${o.address}</p>`;
  });
}

//////////////////////////////////////////////////
// ROLE CONTROL
//////////////////////////////////////////////////

if(currentUser.type === "Civilian"){
  document.getElementById("vehicles").style.display = "none";
  document.getElementById("people").style.display = "none";
  showSection("oc");
} else {
  document.getElementById("oc").style.display = "none";
  showSection("vehicles");
  loadVehicles();
  loadPeople();
}
</script>

</body>
</html>
