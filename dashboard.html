<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lambeth PNC Dashboard</title>
<style>
body{ font-family:Arial,sans-serif; background:#121212; color:#eee; margin:0; padding:0; }
header{ background:#0b3d91; padding:15px; text-align:center; font-size:24px; font-weight:bold; }
nav{ display:flex; justify-content:center; gap:5px; margin:10px; flex-wrap:wrap; }
button{ padding:5px 10px; border:none; border-radius:3px; cursor:pointer; background:#0b3d91; color:white; }
.section{ display:none; padding:10px; max-width:1000px; margin:auto; }
table{ width:100%; border-collapse:collapse; margin-bottom:10px; }
th,td{ padding:8px; border-bottom:1px solid #333; text-align:left; }
</style>
</head>
<body>
<header>Lambeth PNC Dashboard</header>

<nav>
  <button onclick="showSection('reports')">Reports</button>
  <button onclick="showSection('vehicles')">Vehicles</button>
  <button onclick="showSection('people')">People</button>
  <button onclick="showSection('OCs')">Person Logs</button>
  <button onclick="logout()">Logout</button>
</nav>

<!-- Sections -->
<section id="reports" class="section">
<h2>Reports</h2>
<table id="reportsTable"><tr><th>ID</th><th>Description</th></tr></table>
<input id="reportInput" placeholder="Report description">
<button onclick="addReport()">Add Report</button>
</section>

<section id="vehicles" class="section">
<h2>Vehicles</h2>
<table id="vehiclesTable"><tr><th>ID</th><th>Colour</th><th>Plate</th><th>Reason</th></tr></table>
<input id="vehicleColour" placeholder="Colour">
<input id="vehiclePlate" placeholder="Plate">
<input id="vehicleReason" placeholder="Reason (e.g., speeding)">
<button onclick="addVehicle()">Add Vehicle</button>
</section>

<section id="people" class="section">
<h2>People</h2>
<table id="peopleTable"><tr><th>ID</th><th>Name</th></tr></table>
<input id="peopleInput" placeholder="Person name">
<button onclick="addPerson()">Add Person</button>
</section>

<section id="OCs" class="section">
<h2>Create OC</h2>
<input id="ocName" placeholder="RP Name"><br>
<input id="ocBirthday" type="date"><br>
<input id="ocAddress" placeholder="RP Address"><br>
<input id="ocGender" placeholder="Gender"><br>
<input id="ocEthnicity" placeholder="Ethnicity"><br>
<input id="ocMarks" placeholder="Distinguishing Marks"><br>
<button onclick="createOC()">Create OC</button>
</section>

<script>
// KV helpers
async function getDataFromKV(key){
  const res = await fetch(`/api/storage?key=${key}`);
  const data = await res.json();
  return data.value || {};
}
async function saveDataToKV(key,value){
  await fetch('/api/storage',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({key,value})
  });
}

// Current user
const currentUser = JSON.parse(sessionStorage.getItem('currentUser'));
if(!currentUser){ window.location.href='login.html'; }

// Role-based visibility
if(currentUser.type==='Civilian'){
  document.getElementById('reports').style.display='none';
  document.getElementById('vehicles').style.display='none';
  document.getElementById('people').style.display='none';
} else { 
  document.getElementById('OCs').style.display='none';
}

// Show section
function showSection(id){
  document.querySelectorAll('.section').forEach(s=>s.style.display='none');
  document.getElementById(id).style.display='block';
}

// Logout
function logout(){ sessionStorage.removeItem('currentUser'); window.location.href='login.html'; }

// CRUD
async function loadReports(){
  const users = await getDataFromKV('users');
  const r = users[currentUser.username].reports || [];
  const t = document.getElementById('reportsTable'); t.innerHTML='<tr><th>ID</th><th>Description</th></tr>';
  r.forEach((v,i)=>{ const row=t.insertRow(); row.insertCell(0).innerText=i+1; row.insertCell(1).innerText=v; });
}
async function addReport(){
  const val = document.getElementById('reportInput').value.trim(); if(!val) return;
  const users = await getDataFromKV('users');
  users[currentUser.username].reports.push(val);
  await saveDataToKV('users',users);
  document.getElementById('reportInput').value='';
  loadReports();
}

async function loadVehicles(){
  const users = await getDataFromKV('users');
  const v = users[currentUser.username].vehicles || [];
  const t = document.getElementById('vehiclesTable'); t.innerHTML='<tr><th>ID</th><th>Colour</th><th>Plate</th><th>Reason</th></tr>';
  v.forEach((veh,i)=>{ const row=t.insertRow(); row.insertCell(0).innerText=i+1; row.insertCell(1).innerText=veh.colour; row.insertCell(2).innerText=veh.plate; row.insertCell(3).innerText=veh.reason; });
}
async function addVehicle(){
  const colour=document.getElementById('vehicleColour').value.trim();
  const plate=document.getElementById('vehiclePlate').value.trim();
  const reason=document.getElementById('vehicleReason').value.trim();
  if(!colour||!plate||!reason) return;
  const users = await getDataFromKV('users');
  users[currentUser.username].vehicles.push({colour,plate,reason});
  await saveDataToKV('users',users);
  document.getElementById('vehicleColour').value='';
  document.getElementById('vehiclePlate').value='';
  document.getElementById('vehicleReason').value='';
  loadVehicles();
}

async function loadPeople(){
  const users = await getDataFromKV('users');
  const p = users[currentUser.username].people || [];
  const t = document.getElementById('peopleTable'); t.innerHTML='<tr><th>ID</th><th>Name</th></tr>';
  p.forEach((person,i)=>{ const row=t.insertRow(); row.insertCell(0).innerText=i+1; row.insertCell(1).innerText=person; });
}
async function addPerson(){
  const val = document.getElementById('peopleInput').value.trim(); if(!val) return;
  const users = await getDataFromKV('users');
  users[currentUser.username].people.push(val);
  await saveDataToKV('users',users);
  document.getElementById('peopleInput').value='';
  loadPeople();
}

async function createOC(){
  const name=document.getElementById('ocName').value.trim();
  if(!name) return;
  const users = await getDataFromKV('users');
  const OC={ name, birthday:document.getElementById('ocBirthday').value, address:document.getElementById('ocAddress').value, gender:document.getElementById('ocGender').value, ethnicity:document.getElementById('ocEthnicity').value, marks:document.getElementById('ocMarks').value };
  users[currentUser.username].OCs.push(OC);
  await saveDataToKV('users',users);
  alert('OC Created!');
  document.getElementById('ocName').value=''; document.getElementById('ocBirthday').value=''; document.getElementById('ocAddress').value=''; document.getElementById('ocGender').value=''; document.getElementById('ocEthnicity').value=''; document.getElementById('ocMarks').value='';
}

loadReports(); loadVehicles(); loadPeople();
</script>
</body>
</html>
